<!DOCTYPE html>
<html>
<head>
<title>HiAnime GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--bg:#0b0f1a;
--card:#111827;
--text:white;
--accent:#ec4899;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

body.light{
--bg:#f1f5f9;
--card:white;
--text:black;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:20;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

button{
background:var(--accent);
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* HERO */

#hero{
height:65vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:30px;
transition:0.5s;
}

#hero h2{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

/* GRID */

section{
padding:20px;
}

#animeGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
}

.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{transform:scale(1.05);}

.card img{width:100%;}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:50;
}

.modal-content{
background:var(--card);
padding:20px;
width:95%;
max-width:900px;
max-height:90%;
overflow:auto;
border-radius:10px;
}

.close{float:right;cursor:pointer;}

/* LOADING */

#loading{
text-align:center;
padding:20px;
display:none;
}

video{
width:100%;
margin-top:10px;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<button onclick="toggleTheme()">🌙</button>
<h2>🔥 HiAnime GOD MODE</h2>
<input id="search" placeholder="Search...">
</header>

<div id="hero">
<h2 id="heroTitle">Loading...</h2>
</div>

<section>
<div id="animeGrid"></div>
<div id="loading">Loading...</div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

const grid=document.getElementById("animeGrid")
const hero=document.getElementById("hero")
const heroTitle=document.getElementById("heroTitle")
const modal=document.getElementById("modal")
const modalContent=document.getElementById("modalContent")
const loading=document.getElementById("loading")
const search=document.getElementById("search")

let page=1
let query=""

let favorites=JSON.parse(localStorage.getItem("favorites")||"[]")
let continueData=JSON.parse(localStorage.getItem("continue")||"{}")

async function loadAnime(){

loading.style.display="block"

let url=query
?`https://api.jikan.moe/v4/anime?q=${query}&page=${page}`
:`https://api.jikan.moe/v4/top/anime?page=${page}`

const res=await fetch(url)
const data=await res.json()

if(page===1 && data.data.length>0){
hero.style.backgroundImage=`url(${data.data[0].images.jpg.large_image_url})`
heroTitle.innerText=data.data[0].title
}

data.data.forEach(anime=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${anime.images.jpg.image_url}">
<p style="padding:5px">${anime.title}</p>
`

card.onclick=()=>openAnime(anime.mal_id,anime.title)

grid.appendChild(card)

})

loading.style.display="none"
page++

}

async function openAnime(id,title){

modal.style.display="flex"

const res=await fetch(`https://api.jikan.moe/v4/anime/${id}`)
const data=await res.json()
const anime=data.data

localStorage.setItem("continue",JSON.stringify({id,title}))

let episodesHTML=""

try{
const eps=await fetch(`https://api.jikan.moe/v4/anime/${id}/episodes`)
const epData=await eps.json()

epData.data.slice(0,12).forEach(ep=>{
episodesHTML+=`<button onclick="alert('Episode ${ep.mal_id} selected')">EP ${ep.mal_id}</button> `
})

}catch{}

modalContent.innerHTML=`
<h2>${anime.title}</h2>
<img src="${anime.images.jpg.large_image_url}" width="200">
<p>${anime.synopsis||""}</p>

<h3>Episodes</h3>
${episodesHTML||"No episode data"}

<h3>Trailer</h3>
${anime.trailer?.embed_url ? `
<iframe width="100%" height="315"
src="${anime.trailer.embed_url}"
frameborder="0" allowfullscreen></iframe>
`:"No trailer"}
`

}

function closeModal(){
modal.style.display="none"
}

function toggleTheme(){
document.body.classList.toggle("light")
}

window.addEventListener("scroll",()=>{
if(window.innerHeight+window.scrollY>=document.body.offsetHeight-500){
loadAnime()
}
})

search.addEventListener("input",()=>{
grid.innerHTML=""
page=1
query=search.value
loadAnime()
})

loadAnime()

</script>

</body>
</html>
