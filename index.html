<!DOCTYPE html>
<html>
<head>
<title>HiAnime GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

:root{
--bg:#0b0f1a;
--card:#111827;
--text:white;
--accent:#ec4899;
}

body{
margin:0;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:0.3s;
}

body.light{
--bg:#f1f5f9;
--card:white;
--text:black;
background:var(--bg);
color:var(--text);
}

/* HEADER */

header{
position:sticky;
top:0;
z-index:20;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:space-between;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
}

button{
background:var(--accent);
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

/* HERO */

#hero{
height:60vh;
background-size:cover;
background-position:center;
display:flex;
align-items:flex-end;
padding:20px;
}

#hero h2{
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:8px;
}

/* GRID */

section{
padding:20px;
}

#animeGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
}

.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
animation:fadeIn 0.3s ease;
}

.card:hover{transform:scale(1.05);}

.card img{width:100%;}

@keyframes fadeIn{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

/* MODAL */

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:50;
}

.modal-content{
background:var(--card);
padding:20px;
width:95%;
max-width:900px;
max-height:90%;
overflow:auto;
border-radius:10px;
}

.close{float:right;cursor:pointer;}

/* SKELETON */

.skeleton{
height:220px;
border-radius:10px;
background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);
background-size:200% 100%;
animation:loading 1.2s infinite;
}

@keyframes loading{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

#loading{
text-align:center;
padding:20px;
display:none;
}

@media(max-width:600px){
#hero{height:40vh;}
.card:hover{transform:none;}
}

</style>
</head>

<body>

<header>
<button onclick="toggleTheme()">🌙</button>
<h2>🔥 HiAnime GOD MODE</h2>
<input id="search" placeholder="Search...">
</header>

<div id="hero">
<h2 id="heroTitle">Loading...</h2>
</div>

<section>

<div id="animeGrid"></div>
<div id="loading">Loading...</div>

</section>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">✖</span>
<div id="modalContent"></div>
</div>
</div>

<script>

const grid=document.getElementById("animeGrid")
const hero=document.getElementById("hero")
const heroTitle=document.getElementById("heroTitle")
const modal=document.getElementById("modal")
const modalContent=document.getElementById("modalContent")
const loading=document.getElementById("loading")
const search=document.getElementById("search")

let page=1
let query=""
let isLoading=false

async function loadAnime(){

if(isLoading) return
isLoading=true
loading.style.display="block"

try{

let url=`https://api.jikan.moe/v4/top/anime?page=${page}`

if(query){
url=`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(query)}&page=${page}`
}

const res=await fetch(url)

if(!res.ok) throw new Error("Network error")

const data=await res.json()

if(!data.data || data.data.length===0){
isLoading=false
loading.style.display="none"
return
}

if(page===1){
grid.innerHTML=""
hero.style.backgroundImage=`url(${data.data[0].images.jpg.large_image_url})`
heroTitle.innerText=data.data[0].title
}

data.data.forEach(anime=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${anime.images.jpg.image_url}">
<p style="padding:6px">${anime.title}</p>
`

card.onclick=()=>openAnime(anime.mal_id)

grid.appendChild(card)

})

page++

}catch(err){
console.log("Error:",err)
}

loading.style.display="none"
isLoading=false

}

async function openAnime(id){

modal.style.display="flex"
modalContent.innerHTML="Loading..."

try{

const res=await fetch(`https://api.jikan.moe/v4/anime/${id}`)
const data=await res.json()
const anime=data.data

modalContent.innerHTML=`
<h2>${anime.title}</h2>
<img src="${anime.images.jpg.large_image_url}" width="200">
<p>${anime.synopsis||"No description available."}</p>

<h3>Trailer</h3>
${anime.trailer?.embed_url ?
`<iframe width="100%" height="315"
src="${anime.trailer.embed_url}"
frameborder="0" allowfullscreen></iframe>`
:"No trailer available."}
`

}catch(err){
modalContent.innerHTML="Failed to load anime."
}

}

function closeModal(){
modal.style.display="none"
}

function toggleTheme(){
document.body.classList.toggle("light")
}

window.addEventListener("scroll",()=>{
if(isLoading) return

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-400){
loadAnime()
}
})

let timeout
search.addEventListener("input",()=>{
clearTimeout(timeout)
timeout=setTimeout(()=>{
page=1
query=search.value.trim()
loadAnime()
},400)
})

loadAnime()

</script>

</body>
</html>
